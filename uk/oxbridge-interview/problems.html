<style>

:root{--bg:#fff;--ink:#1b2733;--muted:#697585;--line:#e6e9ee;--accent:#184f7d;--accent2:#2e7d5b;--soft:#f6f8fa}
@media (prefers-color-scheme:dark){:root{--bg:#0f1419;--ink:#e6ebf0;--muted:#93a1b0;--line:#232c36;--accent:#6fb2e8;--accent2:#7fd0a6;--soft:#161c24}}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto;padding:40px 20px 100px}
header .brand{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
header h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:8px 0 6px}
header .sub{color:var(--muted);margin:0 0 18px;font-size:15px}
.meter{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.meter-bar{flex:0 0 180px;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
.meter-bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .35s}
.toolbar{position:sticky;top:0;background:var(--bg);padding:16px 0 12px;margin:16px 0 6px;border-bottom:1px solid var(--line);z-index:10}
#search{width:100%;padding:12px 15px;font:inherit;font-size:15px;border:1px solid var(--line);border-radius:10px;background:var(--soft);color:var(--ink);outline:none}
#search:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{font:inherit;font-size:13px;font-weight:600;padding:7px 13px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:99px;cursor:pointer}
.chip b{font-weight:500;color:var(--muted)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}.chip.active b{color:#dbe8f4}
main{margin-top:20px}
.q{padding:22px 0 24px;border-bottom:1px solid var(--line)}
.qhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.qn{font-weight:800;font-size:18px;color:var(--accent);min-width:30px}
.qcat{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:2px 9px;border-radius:99px}
.done{margin-left:auto;font:inherit;font-size:18px;line-height:1;background:none;border:none;cursor:pointer;color:var(--muted)}
.q.solved .done{color:var(--accent2)}.q.solved .qn::after{content:" ✓";color:var(--accent2);font-size:13px}
.qbody{font-size:17px}
.reveal{margin-top:14px;font:inherit;font-size:13px;font-weight:600;color:var(--accent);background:none;border:1px solid var(--line);border-radius:8px;padding:7px 14px;cursor:pointer}
.reveal:hover{border-color:var(--accent)}
.sol{display:none;margin-top:14px;padding:16px 18px;background:var(--soft);border-radius:10px;font-size:15.5px}
.sol.open{display:block}.sol p{margin:.5em 0}.sol ul,.sol ol{margin:.5em 0;padding-left:1.4em}.sol li{margin:.25em 0}
.sol strong{font-weight:700}
.graph{text-align:center;margin:14px 0}.graph img{max-width:100%;height:auto;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px}
.empty{display:none;text-align:center;color:var(--muted);padding:50px 0}
footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}

#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;padding:20px}
.lock{width:100%;max-width:360px;text-align:center}
.lock .ic{font-size:34px}
.lock h2{font-size:20px;font-weight:800;margin:12px 0 4px}
.lock p{color:var(--muted);font-size:14px;margin:0 0 18px}
.lock input{width:100%;padding:13px 15px;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;background:var(--soft);color:var(--ink);outline:none;text-align:center;letter-spacing:.15em}
.lock input:focus{border-color:var(--accent)}
.lock button{margin-top:12px;width:100%;padding:13px;font:inherit;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer}
.lock .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:10px}
#app{display:none}
.desmos{width:100%;height:340px;border:1px solid var(--line);border-radius:8px;overflow:hidden}.graph-cap{font-size:12.5px;color:var(--muted);margin-top:6px;text-align:center}
.soltable{border-collapse:collapse;margin:12px 0;font-size:14px}.soltable td{border:1px solid var(--line);padding:6px 12px;text-align:center}.soltable tr td:first-child{font-weight:700;background:var(--soft,#f6f8fa);text-align:left}</style>
</head>

    <div class="err" id="err"></div>
  </form>
</div>

async function decryptWith(pw){
  const engEnc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',engEnc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  return new TextDecoder().decode(pt);
}

function initApp(){
  var KEY='oxb_solved_v1';
  var solved=new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
  var qs=[].slice.call(document.querySelectorAll('.q'));
  var chips=[].slice.call(document.querySelectorAll('.chip'));
  var search=document.getElementById('search'), empty=document.getElementById('empty');
  var pbar=document.getElementById('pbar'), ptext=document.getElementById('ptext'), cat='all';
  function save(){localStorage.setItem(KEY,JSON.stringify([].slice.call(solved)));}
  function meter(){var n=solved.size,t=qs.length;if(pbar)pbar.style.width=(t?n/t*100:0)+'%';if(ptext)ptext.textContent=n+' / '+t+' 완료';}
  qs.forEach(function(q){
    var n=q.dataset.n;
    var rev=q.querySelector('.reveal');
    if(rev)rev.addEventListener('click',function(){var s=q.querySelector('.sol');s.classList.toggle('open');if(s.classList.contains('open'))setTimeout(function(){initDesmos(s);},0);rev.textContent=s.classList.contains('open')?'풀이 접기':'풀이 보기';});
    var d=q.querySelector('.done');
    if(solved.has(n)){q.classList.add('solved');d.textContent='●';}
    d.addEventListener('click',function(){if(solved.has(n)){solved.delete(n);q.classList.remove('solved');d.textContent='○';}else{solved.add(n);q.classList.add('solved');d.textContent='●';}save();meter();});
  });
  function apply(){var qq=search.value.trim().toLowerCase(),sh=0;qs.forEach(function(q){var ok=(cat==='all'||q.dataset.cat===cat)&&(!qq||q.dataset.text.indexOf(qq)>=0);q.style.display=ok?'':'none';if(ok)sh++;});empty.style.display=sh?'none':'block';}
  chips.forEach(function(c){c.addEventListener('click',function(){chips.forEach(function(x){x.classList.remove('active');});c.classList.add('active');cat=c.dataset.cat;apply();});});
  search.addEventListener('input',apply);
  meter();
  if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();
}

async function enter(pw){
  const html=await decryptWith(pw);            // throws if wrong password (GCM auth fail)
  document.getElementById('app').innerHTML=html;
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  try{sessionStorage.setItem('oxb_pw',pw);}catch(e){}
  initApp(); typeset();
}
document.getElementById('lockform').addEventListener('submit',async function(e){
  e.preventDefault();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{ await enter(pw); }
  catch(ex){ err.textContent='비밀번호가 올바르지 않습니다.'; document.getElementById('pw').value=''; }
});
// 같은 세션에선 재입력 생략
(function(){try{const p=sessionStorage.getItem('oxb_pw');if(p)enter(p).catch(function(){sessionStorage.removeItem('oxb_pw');});}catch(e){}})();
</script>
