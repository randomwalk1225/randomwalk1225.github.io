<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oxbridge STEM 면접 실전 풀이 — 유리함수 부정적분 (EP11)</title>
<style>
:root{--bg:#fff;--ink:#1b2733;--muted:#697585;--line:#e6e9ee;--accent:#184f7d;--accent2:#2e7d5b;
--soft:#f6f8fa;--iv:#eef4fa;--ca:#eef7f1;--note:#fff8ec;--noteink:#8a5a12}
@media (prefers-color-scheme:dark){:root{--bg:#0f1419;--ink:#e6ebf0;--muted:#93a1b0;--line:#232c36;
--accent:#6fb2e8;--accent2:#7fd0a6;--soft:#161c24;--iv:#15222e;--ca:#152219;--note:#241f13;--noteink:#e0b874}}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;background:var(--bg);
color:var(--ink);line-height:1.75;-webkit-font-smoothing:antialiased}
.wrap{max-width:880px;margin:0 auto;padding:34px 20px 120px}
header .brand{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
header h1{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:8px 0 4px;line-height:1.3}
header .en-title{color:var(--muted);font-size:15px;margin:0 0 10px}
header .meta{color:var(--muted);font-size:13.5px;display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:6px}
header .meta b{color:var(--ink);font-weight:600}
.videowrap{position:relative;width:100%;aspect-ratio:16/9;margin:18px 0 4px;border-radius:12px;overflow:hidden;background:#000}
.videowrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.facade{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
text-decoration:none;background-size:cover;background-position:center;cursor:pointer}
.facade::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.4)}
.facade .play{position:relative;width:70px;height:49px;background:#e33;border-radius:13px;display:flex;
align-items:center;justify-content:center;margin-bottom:12px}
.facade .play::after{content:"";border-style:solid;border-width:11px 0 11px 19px;border-color:transparent transparent transparent #fff}
.facade .cap{position:relative;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.vfallback{font-size:12.5px;color:var(--muted);margin:2px 0 8px}
.vfallback a{color:var(--accent);font-weight:600}
.fmtbadge{display:inline-block;font-size:12px;font-weight:700;padding:3px 11px;border-radius:99px;margin-bottom:6px}
.fmtbadge.interview{background:var(--iv);color:var(--accent)}
.fmtbadge.walkthrough{background:var(--ca);color:var(--accent2)}
.box{background:var(--soft);border-radius:10px;padding:16px 20px;margin:16px 0}
.box .bt{font-weight:800;color:var(--accent);font-size:15px;margin-bottom:8px;letter-spacing:.01em}
.box.problem{background:var(--iv)}
.box p{margin:.5em 0}.box ul,.box ol{margin:.5em 0;padding-left:1.3em}.box li{margin:.28em 0}
.problem .en{color:var(--ink)}.problem .ko{color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.toolbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);
padding:12px 0;margin:12px 0 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar .lbl{font-size:12.5px;color:var(--muted);font-weight:600;margin-right:2px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.seg button{font:inherit;font-size:13px;font-weight:600;padding:6px 14px;border:0;background:var(--bg);color:var(--ink);cursor:pointer}
.seg button.active{background:var(--accent);color:#fff}
main{margin-top:14px}
.turn{padding:14px 18px;border-radius:10px;margin:10px 0}
.turn.interviewer{background:var(--iv)}
.turn.candidate{background:var(--ca)}
.turn.presenter{background:var(--soft)}
.turn .head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.turn .sp{font-weight:800;font-size:14px}
.turn.interviewer .sp{color:var(--accent)}
.turn.candidate .sp{color:var(--accent2)}
.turn.presenter .sp{color:var(--accent)}
.turn .role{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:1px 8px}
.turn .ts{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent);background:none;border:1px solid var(--line);
border-radius:99px;padding:3px 10px;cursor:pointer;font-family:ui-monospace,Menlo,monospace}
.turn .ts:hover{border-color:var(--accent);background:var(--accent);color:#fff}
.turn .en{font-size:16.5px}
.turn .ko{font-size:15px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px dashed var(--line)}
.note{background:var(--note);border-radius:8px;padding:10px 14px;margin:8px 0 2px;font-size:14px;color:var(--noteink)}
.note b{color:var(--noteink)}
body.only-en .ko{display:none}body.only-ko .en{display:none}
body.only-en .ko,body.only-ko .en{border-top:0;padding-top:0;margin-top:0}
.kp{background:var(--soft);border-radius:10px;padding:18px 22px;margin:26px 0}
.kp .bt{font-weight:800;color:var(--accent);font-size:16px;margin-bottom:10px}
.kp ol{margin:.2em 0;padding-left:1.3em}.kp li{margin:.4em 0}
.kp .en,.kp .ko{color:inherit;border-top:0;margin-top:0;padding-top:0;font-size:inherit}
.kp .ko{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
body.only-en .kp .ko,body.only-ko .kp .en{margin-top:0;padding-top:0;border-top:0}
footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.printbtn{font:inherit;font-size:13px;font-weight:700;padding:6px 14px;border:1px solid var(--accent);
background:var(--accent);color:#fff;border-radius:99px;cursor:pointer}
.printbtn:hover{opacity:.9}

/* ===== A4 인쇄 (대본 연습용) ===== */
@media print{
  @page{size:A4;margin:14mm 15mm}
  html{scroll-behavior:auto}
  body{background:#fff;color:#000;line-height:1.5;font-size:10.5pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .wrap{max-width:none;margin:0;padding:0}
  .videowrap,.vfallback,.toolbar,footer,header .brand{display:none!important}
  header h1{font-size:16pt;margin:0 0 2pt;color:#000}
  header .en-title{font-size:10pt;margin:0 0 4pt}
  header .meta{font-size:8.5pt;margin-bottom:8pt;gap:2pt 10pt}
  header .meta b{color:#000}
  header{border-bottom:1.5pt solid #000;padding-bottom:6pt;margin-bottom:8pt}
  .box{background:#fff!important;border:1pt solid #999;border-radius:5px;padding:8pt 11pt;margin:8pt 0;break-inside:avoid}
  .box.problem{background:#fff!important}
  .box .bt{font-size:11pt;color:#000}
  .problem .ko{border-top:1pt dashed #bbb}
  main{margin-top:6pt}
  .turn{background:#fff!important;border-radius:0;padding:5pt 0;margin:0;border-bottom:0.5pt solid #ddd;break-inside:avoid}
  .turn.candidate{padding-left:18pt}
  .turn .head{margin-bottom:2pt;gap:7pt}
  .turn .sp{font-size:10.5pt;color:#000}
  .turn.interviewer .sp{color:#000}.turn.candidate .sp{color:#000}
  .turn.candidate .sp::before{content:"› "}
  .turn .role{border:0.5pt solid #999;color:#444;font-size:8pt;padding:0 6pt}
  .turn .ts{margin-left:auto;border:0;background:none!important;color:#999;padding:0;font-size:8.5pt;cursor:auto}
  .turn .en{font-size:10.5pt}
  .turn .ko{font-size:9.5pt;color:#222;border-top:0;padding-top:1pt;margin-top:2pt}
  .note{background:#fff!important;border:0.5pt dashed #bbb;color:#333;font-size:9pt;padding:5pt 9pt;break-inside:avoid}
  .note b{color:#000}
  .kp{background:#fff!important;border:1pt solid #999;break-inside:avoid;padding:10pt 14pt}
  .kp .bt{font-size:12pt;color:#000}
  .kp .ko{border-top:1pt dashed #bbb;margin-top:8pt;padding-top:8pt}
}
</style>

function initDialogue(){

const YID=document.getElementById('player').dataset.vid;
const wrap=document.getElementById('player');
const isFile=location.protocol==='file:';
function embed(sec){wrap.innerHTML='<iframe id="yt" allowfullscreen '+
'allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" '+
'src="https://www.youtube.com/embed/'+YID+'?rel=0&autoplay=1'+(sec?'&start='+sec:'')+'"></iframe>';}
function facade(){wrap.innerHTML='<a class="facade" target="_blank" rel="noopener" '+
'style="background-image:url(https://i.ytimg.com/vi/'+YID+'/hqdefault.jpg)" '+
'href="https://www.youtube.com/watch?v='+YID+'"><span class="play"></span>'+
'<span class="cap">YouTube에서 영상 보기 ↗</span></a>';}
if(isFile){facade();}else{embed(0);}
function jump(sec){
  if(isFile){window.open('https://www.youtube.com/watch?v='+YID+'&t='+sec+'s','_blank');}
  else{embed(sec);window.scrollTo({top:0,behavior:'smooth'});}
}
document.querySelectorAll('.ts').forEach(b=>b.addEventListener('click',()=>jump(+b.dataset.sec)));
function setLang(m){document.body.classList.remove('only-en','only-ko');
if(m==='en')document.body.classList.add('only-en');if(m==='ko')document.body.classList.add('only-ko');
document.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('active',x.dataset.m===m));
localStorage.setItem('lang_'+YID,m);
if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();}
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.m)));
setLang(localStorage.getItem('lang_'+YID)||'both');

}

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  const html=new TextDecoder().decode(pt);
  document.getElementById('app').innerHTML=html;
  document.getElementById('gate').style.display='none';
  initDialogue();
}
async function tryUnlock(pw,fromCache){
  try{ await unlock(pw); sessionStorage.setItem('oxpw',pw); }
  catch(e){ if(!fromCache){ document.getElementById('err').textContent='비밀번호가 올바르지 않습니다.'; } }
}
document.getElementById('go').addEventListener('click',()=>tryUnlock(document.getElementById('pw').value,false));
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock(document.getElementById('pw').value,false);});
const cached=sessionStorage.getItem('oxpw'); if(cached){ tryUnlock(cached,true); }
document.getElementById('pw').focus();
</script></body></html>
