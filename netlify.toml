# This tells Netlify where your functions source code is.
# Adjust if your functions are in a different directory.
[build]
  functions = "netlify/functions"
  # If you have a specific build command and publish directory (e.g., for Jekyll),
  # make sure those are also correctly set here. For example:
  # command = "jekyll build"
  # publish = "_site" # Or "." if your repo root is your publish dir

# This section ensures the 'quizzes' directory is available to your functions.
[functions]
  included_files = ["quizzes/**"]
