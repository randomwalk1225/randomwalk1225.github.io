<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | escape }} | My Awesome Blog</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- MathJax Configuration -->
  <script type="text/x-mathjax-config">
    MathJax = {
      tex: {
        inlineMath: [['\(', '\)'];
        displayMath: [['$', '$']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="logo">SANGYEOL's Blog</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about.html' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; 2025 SANGYEOL LEE. All rights reserved.</p>
    <p><a href="https://github.com/randomwalk1225" target="_blank">GitHub</a></p>
  </footer>
</body>
</html>
