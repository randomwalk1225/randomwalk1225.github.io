---
layout: quiz_layout
title: 퀴즈 풀기
---

<div id="quiz-player-container">
    <h2 id="quiz-title">퀴즈 제목</h2>
    <div id="user-info">
        <label for="userId">사용자 ID:</label>
        <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요">
    </div>
    <div id="quiz-content">
        <!-- 퀴즈 문제가 여기에 동적으로 로드됩니다. -->
    </div>
    <button id="submit-quiz">퀴즈 제출</button>
    <div id="quiz-result">
        <!-- 채점 결과가 여기에 표시됩니다. -->
    </div>
</div>

<script src="{{ '/quiz_app/assets/js/quiz_player.js' | relative_url }}"></script>
