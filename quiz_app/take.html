---
layout: quiz_layout
title: 퀴즈 풀기
---

<div id="quiz-player-container">
    <!-- Timer elements -->
    <div id="quiz-timer-widget" class="quiz-timer-widget"> 
        <div id="current-time-display">--:--:--</div>
        <div id="quiz-elapsed-time-display">경과 시간: 00:00</div>
    </div>
    <!-- Button moved outside the timer widget so it can remain visible -->
    <button id="toggle-timer-visibility" style="position: fixed; top: 110px; right: 20px; z-index: 1001;">시계 숨기기</button>
    
    <h2 id="quiz-title">퀴즈 제목</h2>
    <div id="user-info" style="margin-bottom: 15px;">
        <label for="userIdQuiz">사용자 ID:</label>
        <input type="text" id="userIdQuiz" placeholder="ID를 입력하세요">
    </div>
    <div id="quiz-content">
        <!-- 퀴즈 문제가 여기에 동적으로 로드됩니다. -->
        <!-- 로그인하지 않은 경우, 여기에 "로그인 후 이용 가능합니다." 메시지 표시 가능 (JS에서 처리) -->
    </div>
    <button id="submit-quiz">퀴즈 제출</button>
    <div id="quiz-result">
        <!-- 채점 결과가 여기에 표시됩니다. -->
    </div>
</div>

<script src="{{ '/quiz_app/assets/js/quiz_player.js' | relative_url }}"></script>
