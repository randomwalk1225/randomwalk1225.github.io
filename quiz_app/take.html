---
layout: quiz_layout
title: 퀴즈 풀기
---

<div id="quiz-player-container">
    <div id="quiz-timer-widget" class="quiz-timer-widget">
        <div id="current-time-display">--:--:--</div>
        <div id="quiz-elapsed-time-display">경과 시간: 00:00</div>
        <button id="toggle-timer-visibility">시계 숨기기</button>
    </div>
    <h2 id="quiz-title">퀴즈 제목</h2>
    <div id="user-info">
        <!-- 사용자 ID 입력란 삭제 -->
    </div>
    <div id="quiz-content">
        <!-- 퀴즈 문제가 여기에 동적으로 로드됩니다. -->
        <!-- 로그인하지 않은 경우, 여기에 "로그인 후 이용 가능합니다." 메시지 표시 가능 (JS에서 처리) -->
    </div>
    <button id="submit-quiz">퀴즈 제출</button>
    <div id="quiz-result">
        <!-- 채점 결과가 여기에 표시됩니다. -->
    </div>
</div>

<script src="{{ '/quiz_app/assets/js/quiz_player.js' | relative_url }}"></script>
