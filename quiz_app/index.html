---
layout: quiz_layout
title: 퀴즈 목록
---

<div id="quiz-list-container">
  <!-- 1줄짜리 flex 컨테이너: 검색창 + 정렬박스 -->
  <div class="d-flex align-items-center mb-3">
    <!-- 1) flex-grow-1: 남는 공간 쭉 채우기, me-3: 오른쪽 1rem 여백 -->
    <input
      type="text"
      id="quiz-search-input"
      class="form-control flex-grow-1 me-3"
      placeholder="퀴즈 검색…"
      aria-label="퀴즈 검색"
    />

    <!-- 2) w-auto: 내용물 폭만 차지 -->
    <select
      id="quiz-sort-combo"
      class="form-control w-auto"
      aria-label="정렬 옵션"
    >
      <option value="date_desc" selected>날짜 거꾸로</option>
      <option value="date_asc">날짜 똑바로</option>
      <option value="name_asc">이름 똑바로(A → Z)</option>
      <option value="name_desc">이름 거꾸로(Z → A)</option>
    </select>
  </div>

  <div
    id="quiz-card-container"
    class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
  >
    <!-- JS 로 카드들 동적으로 추가 -->
  </div>
</div>

<script src="{{ '/quiz_app/assets/js/app_main.js' | relative_url }}"></script>
