---
layout: quiz_layout
title: 퀴즈 대시보드
---

<div id="dashboard-container">
    <h2>퀴즈 대시보드</h2>
    
    <section id="overall-stats">
        <h3>전체 통계</h3>
        <p>평균 점수: <span id="avg-score">-</span>점</p>
        <!-- 추가적인 전체 통계가 여기에 표시될 수 있습니다. -->
    </section>
    
    <section id="ranking">
        <h3>점수 랭킹</h3>
        <ol id="score-ranking-list">
            <!-- 사용자 랭킹이 여기에 표시됩니다. (예: <li>🥇 User1 - 95점</li>) -->
        </ol>
    </section>

    <section id="badges-earned">
        <h3>획득한 뱃지 (예시)</h3>
        <div id="badge-display">
            <!-- 뱃지가 여기에 표시될 수 있습니다. -->
            <span class="badge">수학 마스터</span>
            <span class="badge">역사학자</span>
        </div>
    </section>
</div>

<script src="{{ '/quiz_app/assets/js/dashboard.js' | relative_url }}"></script>
