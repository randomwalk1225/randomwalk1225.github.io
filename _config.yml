title: 내 블로그 홈

collections:
  quizzes:
    output: true
    permalink: /quizzes/:path/ # JavaScript에서 fetch하는 경로와 일치시키기 위함

giscus:
  repo: "randomwalk1225/randomwalk1225.github.io" # 실제 GitHub 사용자명/저장소명으로 변경 필요
  repo_id: "YOUR_REPO_ID" # Giscus 설정 후 발급받은 Repository ID 입력
  category: "Comments" # GitHub Discussions에서 사용할 카테고리명 (미리 생성 필요)
  category_id: "YOUR_CATEGORY_ID" # Giscus 설정 후 발급받은 Category ID 입력
  mapping: "pathname" # URL 경로 기준으로 댓글 매핑
  reactions_enabled: "1" # '좋아요' 같은 반응 기능 사용 (1: 사용, 0: 미사용)
  emit_metadata: "0" # 댓글 작성자 메타데이터 전송 여부 (0: 미사용)
  input_position: "bottom" # 댓글 입력창 위치 (top 또는 bottom)
  theme: "preferred_color_scheme" # 테마 (preferred_color_scheme, light, dark 등)
  lang: "ko" # 언어 설정
